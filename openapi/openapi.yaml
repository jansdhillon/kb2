# SPDX-License-Identifier: Apache-2.0

openapi: 3.1.0
info:
  title: Kathrin's Books
  version: "0.0.1"
  description: API specification for Kathrin's Books.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: Authentication
    description: Authentication and authorization operations.

servers:
  - url: https://{kathrins_books_root_url}
    variables:
      kathrins_books_root_url:
        default: kathrinsbooks.com

security:
  - bearerAuth: []

paths:
  "/api/scripts/{script_id}":
    $ref: "./components/paths/script.yaml#/paths/~1api~1scripts~1{script_id}"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ScriptIdPathParam:
      $ref: "./components/parameters/script.yaml#/ScriptIdPathParam"

  schemas:
    Error:
      $ref: "./components/schemas/error.yaml#/Error"

  responses:
    Unauthorized:
      $ref: "./components/responses/error.yaml#/Unauthorized"
