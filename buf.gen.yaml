version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/bufbuild/buf-examples/gen
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative

  - remote: buf.build/grpc/go
    out: gen/go
    opt:
      - paths=source_relative

  - remote: buf.build/connectrpc/go
    out: gen/go
    opt:
      - paths=source_relative
      - simple

  - remote: buf.build/community/pseudomuto-doc:v1.5.1
    out: gen/docs
    opt:
      - markdown,README.md,source_relative

  - remote: buf.build/grpc-ecosystem/gateway:v2.28.0
    out: gen/go
    opt:
      - paths=source_relative

  - remote: buf.build/grpc-ecosystem/openapiv2
    out: gen/openapi/v2
    opt:
      - allow_merge=true
      - merge_file_name=api
      - openapi_naming_strategy=package
      - simple_operation_ids=true
inputs:
  - directory: proto
